classes:

  SubstanceSample:
    class_uri: SIO:001378
    is_a: MaterialSample
    aliases:
      - analyte
    description: A MaterialSample derived from a ChemicalSubstance that is of interest in an analytical procedure.
    mixins:
      - ChemicalSubstance

  PolymerSample:
    is_a: SubstanceSample
    class_uri: SIO:001378
    description: A SubstanceSample derived from a Polymer.
    mixins:
      - Polymer
    todos:
      - "Find a better mapping, as it is currently mapped to same ontology class as its parent."

  Laboratory:
    is_a: Surrounding
    class_uri: ENVO:01001405
    description: A facility that provides controlled conditions in which scientific or technological research, experiments, and measurement may be performed.


  LabSample:
    is_a: MaterialSample
    class_uri: OBI:0000747
    description: see MaterialSample

  MaterialCombinationProcess:
    is_a: EvaluatedActivity
    class_uri: OBI:0000652

  StirringProcess:
    is_a: EvaluatedActivity
    class_uri: CHMO:0002774

  TemperaturChangingProcess:
    is_a: EvaluatedActivity
    class_uri: CHMO:0002774

  RestingProcess:
    is_a: EvaluatedActivity
    class_uri: OBI:0000045

  SeparationProcess:
    is_a: EvaluatedActivity
    class_uri: OBI:0600014

  WashingProcess:
    is_a: EvaluatedActivity
    class_uri: OBI:0000653

  ProcessRepetitionStep:
    is_a: EvaluatedActivity
    class_uri: OBI:0000303

  QuantitativeAttribute:
    name: QuantitativeAttribute
    description: A quantifiable piece of information that is attributed to an Entity,
      Activity or AgenticEntity.
    in_subset:
    - domain_agnostic_core
    mixins:
    - ClassifierMixin
    slots:
    - title
    - description
    - value
    slot_usage:
      value:
        name: value
        description: The slot to provide the literal value of the QuantitativeAttribute.
        range: float
        required: true
    attributes:
      has_quantity_type:
        name: has_quantity_type
        description: The type of quality that is quantifiable according to the QUDT
          ontology.
        slot_uri: qudt:hasQuantityKind
        range: DefinedTerm
        bindings:
        - range: QUDTQuantityKindEnum
          obligation_level: RECOMMENDED
          binds_value_of: id
          description: Binds the type of a quantifiable attribute to a QUDT Quantity
            Kind instance from the QUDT Quantity Kind vocabulary.
        required: true
      unit:
        name: unit
        slot_uri: qudt:unit
        range: DefinedTerm
        bindings:
        - range: QUDTUnitEnum
          obligation_level: RECOMMENDED
          binds_value_of: id
          description: Restricts the allowable defined terms to the QUDT Unit vocabulary.
        recommended: true
    class_uri: qudt:Quantity

Duration:
